<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
            background:#f5f5f5;color:#333;min-height:100vh;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
        }
        .box{text-align:center;padding:40px 20px;}
        .code{font-size:80px;font-weight:700;color:#d1d5db;line-height:1;}
        .title{font-size:22px;font-weight:600;margin:16px 0 8px;color:#374151;}
        .desc{font-size:14px;color:#6b7280;margin-bottom:28px;}
        .btn{
            display:inline-block;padding:10px 28px;background:#3b82f6;
            color:#fff;border-radius:6px;text-decoration:none;font-size:14px;
            transition:background .2s;
        }
        .btn:hover{background:#2563eb;}
        .footer{margin-top:48px;font-size:12px;color:#9ca3af;}
    </style>
</head>
<body>
<div class="box">
    <div class="code">404</div>
    <div class="title">页面不存在</div>
    <div class="desc">抱歉，您访问的页面不存在或已被删除</div>
    <a href="/" class="btn">返回首页</a>
    <div class="footer">Powered by Nginx</div>
</div>
{统计脚本}
</body>
</html>
